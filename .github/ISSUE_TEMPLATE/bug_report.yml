name: Bug Report
description: Report a bug in kube-rbac-proxy
title: "[Bug]: "
labels: ["kind/bug"]
body:
  - type: markdown
    attributes:
      value: |
        **Do not post secrets or personal data** (tokens, passwords, keys, kubeconfigs).
        Please redact sensitive values before submitting. If this is a **security vulnerability**,
        use the private security reporting process instead of filing a public issue.

  - type: checkboxes
    id: existing-issue
    attributes:
      label: Is there an existing issue for this?
      options:
        - label: I have searched the existing issues
          required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Configure kube-rbac-proxy with '...'
        2. Send request to '...'
        3. Observe '...'
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Version and platform details.
      placeholder: |
        - kube-rbac-proxy version:
        - Kubernetes version:
        - Platform: (e.g., OpenShift 4.16, vanilla k8s)
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs or Error Output
      description: Paste redacted logs/error output only. Remove tokens, credentials, keys, and personal data.
      render: shell
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context about the problem.
    validations:
      required: false
